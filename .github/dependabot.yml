version: 2
updates:
  # Keep GitHub Actions workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  # Keep Python deps up to date (uv-managed, but Dependabot reads pyproject.toml).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    groups:
      # Group dev tooling so it doesn't spam the PR queue.
      dev-tooling:
        patterns:
          - "ruff"
          - "ty"
          - "pytest*"
          - "pre-commit"
          - "poethepoet"

  # Keep the Dockerfile base image fresh.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
