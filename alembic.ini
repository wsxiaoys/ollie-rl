# Alembic configuration for ollie-rl.
#
# The migration environment lives inside the package so it ships in the
# Docker image. The database URL is intentionally NOT hard-coded here; it is
# resolved at runtime from the DATABASE_URL environment variable (falling back
# to the same default as the application) inside env.py.
#
# Common commands (run via `uv run`):
#   uv run alembic revision --autogenerate -m "describe change"
#   uv run alembic upgrade head
#   uv run alembic downgrade -1
#   uv run alembic current

[alembic]
# Path to migration scripts, relative to the repo root.
script_location = src/ollie_rl/db/migrations

# Template used to generate migration file names; prefixing with a UTC
# timestamp keeps them chronologically ordered on disk.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use os.pathsep to split the version_locations value.
version_path_separator = os

# sqlalchemy.url is populated at runtime from DATABASE_URL in env.py.
sqlalchemy.url =


[post_write_hooks]
# Post-generation hooks are intentionally left unconfigured; formatting is
# handled by the project's ruff configuration.


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
