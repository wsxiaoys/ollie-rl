# Pre-commit hooks for ollie-rl.
#
# Install both stages locally:
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#
# Fast checks (ruff, whitespace) run on every commit so PRs arrive clean.
# Slow checks (ty, pytest, full format) run on push so iteration stays fast.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-added-large-files
        args: ["--maxkb=512"]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: poe-format
        name: poe format
        entry: uv run poe format
        language: system
        pass_filenames: false
        stages: [pre-push]
